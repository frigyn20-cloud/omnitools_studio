<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>OmniTool Studio – Free Online Calculators, Converters & Utilities</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://omnitoolstudio.com/" />

    <!-- Primary SEO -->
    <meta name="description" content="Free online calculators, unit converters, QR code generator, password generator, word counter, text tools, timers and more. No sign-up required. Fast and mobile-friendly." />
    <meta name="keywords" content="online calculator, unit converter, QR code generator, password generator, word counter, discount calculator, loan calculator, free tools" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="OmniTool Studio" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="OmniTool Studio" />
    <meta property="og:title" content="OmniTool Studio – Free Online Calculators, Converters & Utilities" />
    <meta property="og:description" content="Free online calculators, unit converters, QR code generator, password generator, word counter, text tools, timers and more. No sign-up required." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://omnitoolstudio.com/" />
    <meta property="og:image" content="https://omnitoolstudio.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OmniTool Studio – Free Online Calculators & Converters" />
    <meta name="twitter:description" content="Free calculators, converters, QR codes, password generator, word counter and more. Fast, free, no sign-up." />
    <meta name="twitter:image" content="https://omnitoolstudio.com/og-image.png" />

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "OmniTool Studio",
      "url": "https://omnitoolstudio.com/",
      "description": "Free online calculators, converters, and utility tools.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://omnitoolstudio.com/tools?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "OmniTool Studio",
      "url": "https://omnitoolstudio.com/",
      "logo": "https://omnitoolstudio.com/favicon.svg"
    }
    </script>

    <link rel="preconnect" href="https://api.fontshare.com" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=switzer@400,500,600,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
